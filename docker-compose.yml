services:
  # SERVICIO 1: Base de Datos
  db:
    image: postgres:15-alpine
    container_name: mochilalista_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_mochilalista:/var/lib/postgresql/data
    # 🔥 BARRERA 1: Docker verifica que la BD responda a comandos antes de continuar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SERVICIO 2: Panel de Administración
  pgadmin:
    image: dpage/pgadmin4
    container_name: mochilalista_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mochilalista.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # SERVICIO 3: Backend (API)
  api:
    build: ./backend
    container_name: mochilalista_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env  
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      # 🔥 La API ahora espera a que el 'healthcheck' de la BD sea exitoso
      db:
        condition: service_healthy

volumes:
  postgres_data_mochilalista: