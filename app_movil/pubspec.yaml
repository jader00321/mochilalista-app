name: app_movil
description: "MochilaLista Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  url_launcher: ^6.2.5
  mobile_scanner: ^6.0.4
  permission_handler: ^11.3.0
  photo_view: ^0.14.0
  http_parser: ^4.0.2
  mime: ^1.0.4
  cached_network_image: ^3.3.0
  multi_split_view: ^3.0.1
  pdf: ^3.10.4
  printing: ^5.11.0
  shared_preferences: ^2.2.2
  dio: ^5.0.0
  gal: ^2.3.0
  geolocator: ^13.0.0
  flutter_dotenv: ^5.1.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  blue_thermal_printer: ^1.2.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  image: ^4.2.0

  # ==========================================
  # 🔥 NUEVAS DEPENDENCIAS (VERSIÓN OFFLINE)
  # ==========================================
  # 1. Base de datos local
  sqflite: ^2.3.0
  path: ^1.8.3

  # 2. Seguridad Dual (PIN + Huella)
  local_auth: ^2.1.8
  # flutter_secure_storage ya lo tenías, excelente.

  # 3. Validaciones de Hardware (Internet)
  # geolocator ya lo tenías, excelente.
  connectivity_plus: ^5.0.2

  flutter_local_notifications: ^17.0.1
  # 4. Tareas en segundo plano (Backups automáticos)
  workmanager: ^0.9.0

  file_picker: ^8.0.0
  google_sign_in: ^6.1.6
  googleapis: ^11.4.0
  googleapis_auth: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env